name: AI Gods 자동 토론

on:
  push:
    paths-ignore:
      - 'debates/**'
      - 'outputs/**'
      - 'training-data/**'
      - 'dpo-data/**'
      - '.obsidian/**'
  schedule:
    - cron: '0 0,2,4,6,8,10,12,14 * * *'
  workflow_dispatch:

concurrency:
  group: ai-gods-auto-debate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  debate:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 자동 토론 실행
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: node scripts/auto-debate.mjs

      - name: 토론 결과 자동 커밋
        run: |
          git config user.name "AI Gods Bot"
          git config user.email "bot@ai-gods.auto"
          git add debates/
          git diff --cached --quiet || git commit -m "auto: 토론 결과 저장 $(date +'%Y-%m-%d %H:%M')"
          git push
