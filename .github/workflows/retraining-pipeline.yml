name: AI Gods 재학습 파이프라인

on:
  workflow_run:
    workflows: ['AI Gods 자동 토론']
    types: [completed]
  workflow_dispatch:
    inputs:
      force_prepare:
        description: 임계치와 무관하게 dataset export 수행
        required: false
        type: boolean
        default: false
      run_training:
        description: self-hosted GPU runner에서 실제 SFT/DPO 학습 수행
        required: false
        type: boolean
        default: false
      run_remote_training:
        description: 외부 GPU 웹훅으로 원격 학습 잡 트리거
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '30 14 * * *'

concurrency:
  group: ai-gods-retraining-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_run_readiness: ${{ steps.check.outputs.can_run_readiness }}

    steps:
      - name: 재학습 전제조건 확인
        id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "can_run_readiness=true" >> "$GITHUB_OUTPUT"
            echo "::notice::SUPABASE_SERVICE_ROLE_KEY 가 설정되어 재학습 파이프라인을 실행합니다."
          else
            echo "can_run_readiness=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SUPABASE_SERVICE_ROLE_KEY 가 없어 재학습 파이프라인을 정상 스킵합니다. 보안 강화 이후 자동 readiness/export 에는 service role secret 이 필요합니다."
          fi

  readiness:
    needs: preflight
    if: needs.preflight.outputs.can_run_readiness == 'true' && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      ready_for_export: ${{ steps.readiness.outputs.ready_for_export }}
      ready_for_sft: ${{ steps.readiness.outputs.ready_for_sft }}
      ready_for_dpo: ${{ steps.readiness.outputs.ready_for_dpo }}
      recommended_for_training: ${{ steps.readiness.outputs.recommended_for_training }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 학습 준비도 평가
        id: readiness
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/check-training-readiness.mjs --out outputs/training-readiness.json

      - name: 준비도 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: training-readiness
          path: outputs/training-readiness.json
          if-no-files-found: error

  prepare-datasets:
    needs: readiness
    if: needs.readiness.outputs.ready_for_export == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_prepare)
    runs-on: ubuntu-latest
    outputs:
      snapshot_id: ${{ steps.prepare.outputs.snapshot_id }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 데이터 export 의존성 설치
        run: python -m pip install -r requirements-data.txt

      - name: warehouse snapshot + 데이터셋 준비
        id: prepare
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/prepare-training-datasets.mjs

      - name: 데이터셋 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: training-datasets
          path: |
            training-data/**
            dpo-data/**
            warehouse/latest-snapshot.json
            outputs/training-readiness.json
            outputs/training-datasets-manifest.json
          if-no-files-found: error

  train-self-hosted:
    needs: [readiness, prepare-datasets]
    if: github.event_name == 'workflow_dispatch' && inputs.run_training && needs.prepare-datasets.result == 'success'
    runs-on: self-hosted
    timeout-minutes: 1440

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 학습 데이터셋 다운로드
        uses: actions/download-artifact@v4
        with:
          name: training-datasets
          path: .

      - name: 학습 의존성 설치
        run: python -m pip install -r requirements-training.txt

      - name: SFT 파인튜닝
        run: python scripts/finetune-god.py --god all

      - name: DPO 강화학습
        if: needs.readiness.outputs.ready_for_dpo == 'true'
        run: python scripts/train_dpo.py --god all

      - name: 모델 병합 및 레지스트리 등록
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MODEL_RUN_ID: gh-${{ github.run_id }}
          DATASET_SNAPSHOT_ID: ${{ needs.prepare-datasets.outputs.snapshot_id }}
        run: python scripts/merge-and-register.py --god all

      - name: 학습 결과 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-adapters
          path: |
            models/lora/**
            models/dpo/**
          if-no-files-found: warn

  train-remote-cloud:
    needs: [readiness, prepare-datasets]
    if: needs.prepare-datasets.result == 'success' && (needs.readiness.outputs.recommended_for_training == 'true' || (github.event_name == 'workflow_dispatch' && inputs.run_remote_training))
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 데이터셋 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: training-datasets
          path: .

      - name: 원격 GPU 학습 트리거
        id: remote_train
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          HF_LORA_REPO: ${{ secrets.HF_LORA_REPO }}
          REMOTE_TRAINING_PROVIDER: ${{ vars.REMOTE_TRAINING_PROVIDER }}
          REMOTE_TRAINING_WEBHOOK_URL: ${{ secrets.REMOTE_TRAINING_WEBHOOK_URL }}
          REMOTE_TRAINING_BEARER_TOKEN: ${{ secrets.REMOTE_TRAINING_BEARER_TOKEN }}
          REMOTE_TRAINING_SIGNED_URL_EXPIRES_IN: ${{ vars.REMOTE_TRAINING_SIGNED_URL_EXPIRES_IN }}
        run: node scripts/trigger-remote-training.mjs --manifest outputs/training-datasets-manifest.json --readiness outputs/training-readiness.json

      - name: 원격 학습 요청 리포트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: remote-training-request
          path: outputs/remote-training-request.json
          if-no-files-found: warn